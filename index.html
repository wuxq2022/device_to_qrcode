<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备二维码生成器</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>设备二维码生成器</h1>
        <form id="qrcodeForm">
            <div class="form-group">
                <label for="id">ID:</label>
                <input type="text" id="id" name="id" required>
            </div>
            <div class="form-group">
                <label for="external_id">External ID:</label>
                <input type="text" id="external_id" name="external_id" required>
            </div>
            <div class="form-group">
                <label for="serial_number">Serial Number:</label>
                <input type="text" id="serial_number" name="serial_number" required>
            </div>
            <div class="form-group">
                <label for="device_description">设备描述:</label>
                <input type="text" id="device_description" name="device_description" required>
            </div>
            <div class="form-group">
                <label for="model">型号 (Model):</label>
                <input type="text" id="model" name="model" required>
            </div>
            <button type="button" id="generateBtn">生成二维码</button>
        </form>

        <div class="preview">
            <h2>预览</h2>
            <div id="qrcodePreview"></div>
            <canvas id="qrcodeCanvas" style="display: none;"></canvas>
            <button type="button" id="downloadBtn" style="display: none;">下载图片</button>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
